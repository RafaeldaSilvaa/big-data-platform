name: Big Data Platform CI/CD

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  validate:
    name: Validate Configuration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Validate docker-compose.yml
        run: docker compose config --quiet

      - name: Check Dockerfiles exist
        run: |
          cd images
          for dir in */; do
            if [ ! -f "${dir}Dockerfile" ]; then
              echo "ERROR: Missing Dockerfile in ${dir}"
              exit 1
            fi
          done

      - name: Validate shell scripts
        run: |
          cd scripts
          for script in *.sh; do
            bash -n "$script" || exit 1
          done

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd frontend && npm install --legacy-peer-deps

      - name: Run lint
        run: cd frontend && npx eslint src --ext .js,.jsx || true

  build-all:
    name: Build All Docker Images
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      matrix:
        include:
          - name: Base
            dockerfile: images/base/Dockerfile
            tag: bigdata-platform-base:latest
          - name: Hadoop
            dockerfile: images/hadoop/Dockerfile
            tag: bigdata-platform-hadoop:latest
          - name: Zookeeper
            dockerfile: images/zookeeper/Dockerfile
            tag: bigdata-platform-zookeeper:latest
          - name: Kafka
            dockerfile: images/kafka/Dockerfile
            tag: bigdata-platform-kafka:latest
          - name: Spark
            dockerfile: images/spark/Dockerfile
            tag: bigdata-platform-spark:latest
          - name: Hive
            dockerfile: images/hive/Dockerfile
            tag: bigdata-platform-hive:latest
          - name: HBase
            dockerfile: images/hbase/Dockerfile
            tag: bigdata-platform-hbase:latest
          - name: NiFi
            dockerfile: images/nifi/Dockerfile
            tag: bigdata-platform-nifi:latest
          - name: Sqoop
            dockerfile: images/sqoop/Dockerfile
            tag: bigdata-platform-sqoop:latest
          - name: Oozie
            dockerfile: images/oozie/Dockerfile
            tag: bigdata-platform-oozie:latest
          - name: Pig
            dockerfile: images/pig/Dockerfile
            tag: bigdata-platform-pig:latest
          - name: Mahout
            dockerfile: images/mahout/Dockerfile
            tag: bigdata-platform-mahout:latest
          - name: Flume
            dockerfile: images/flume/Dockerfile
            tag: bigdata-platform-flume:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.name }} Image
        run: docker build -t ${{ matrix.tag }} -f ${{ matrix.dockerfile }} .

      - name: Test ${{ matrix.name }} Image - Java availability
        run: docker run --rm ${{ matrix.tag }} which java

      - name: Test ${{ matrix.name }} Image - JAVA_HOME set
        run: docker run --rm ${{ matrix.tag }} bash -c "test -n \$JAVA_HOME"

      - name: Test ${{ matrix.name }} Image - Services available
        run: |
          case ${{ matrix.name }} in
            Base)
              docker run --rm ${{ matrix.tag }} java -version
              ;;
            Hadoop)
              docker run --rm ${{ matrix.tag }} bash -c "which hadoop && hadoop version | head -2"
              ;;
            Zookeeper)
              docker run --rm ${{ matrix.tag }} bash -c "which zkServer.sh"
              ;;
            Kafka)
              docker run --rm ${{ matrix.tag }} bash -c "which kafka-topics.sh"
              ;;
            Spark)
              docker run --rm ${{ matrix.tag }} bash -c "spark-submit --version"
              ;;
            Hive)
              docker run --rm ${{ matrix.tag }} bash -c "which hive && hive --version"
              ;;
            HBase)
              docker run --rm ${{ matrix.tag }} bash -c "which hbase && hbase version"
              ;;
            NiFi)
              docker run --rm ${{ matrix.tag }} bash -c "test -f /opt/nifi/current/bin/nifi.sh"
              ;;
            Sqoop)
              docker run --rm ${{ matrix.tag }} bash -c "which sqoop && sqoop version"
              ;;
            Oozie)
              docker run --rm ${{ matrix.tag }} bash -c "test -f /opt/oozie/bin/oozie"
              ;;
            Pig)
              docker run --rm ${{ matrix.tag }} bash -c "which pig && pig -version"
              ;;
            Mahout)
              docker run --rm ${{ matrix.tag }} bash -c "test -d /opt/mahout/bin"
              ;;
            Flume)
              docker run --rm ${{ matrix.tag }} bash -c "which flume-ng"
              ;;
          esac

  verify-builds:
    name: Verify All Builds
    runs-on: ubuntu-latest
    needs: build-all
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: List built images
        run: docker images | grep bigdata-platform

      - name: Verify docker-compose services
        run: docker compose config --services

  test-platform:
    name: Run Platform Tests
    runs-on: ubuntu-latest
    needs: build-all
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml pytest

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Run configuration tests
        run: python -m pytest tests/test_platform.py::TestConfiguration -v

      - name: Run docker-compose tests
        run: python -m pytest tests/test_platform.py::TestDockerCompose -v

      - name: Run dockerfile tests
        run: python -m pytest tests/test_platform.py::TestDockerfiles -v

      - name: Run script tests
        run: python -m pytest tests/test_platform.py::TestScripts -v

      - name: Run application tests
        run: python -m pytest tests/test_platform.py::TestApplications -v

      - name: Run frontend tests
        run: python -m pytest tests/test_platform.py::TestFrontend -v

      - name: Run Docker image functional tests
        run: python -m pytest tests/test_platform.py::TestDockerImages -v --tb=short
        run: python -m pytest tests/test_platform.py::TestDockerImages -v --tb=short