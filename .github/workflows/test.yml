name: Big Data Platform CI/CD

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  validate:
    name: Validate Configuration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Validate docker-compose.yml
        run: docker compose config --quiet

      - name: Check Dockerfiles exist
        run: |
          cd images
          for dir in */; do
            if [ ! -f "${dir}Dockerfile" ]; then
              echo "ERROR: Missing Dockerfile in ${dir}"
              exit 1
            fi
          done

      - name: Validate shell scripts
        run: |
          cd scripts
          for script in *.sh; do
            bash -n "$script" || exit 1
          done

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd frontend && npm install --legacy-peer-deps

      - name: Run lint
        run: cd frontend && npm run lint || true

  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Build Base Image
        run: docker build -t bigdata-platform:base images/base

      - name: Build Hadoop Image
        run: docker build -t bigdata-platform:hadoop images/hadoop

      - name: Build Spark Image
        run: docker build -t bigdata-platform:spark images/spark

      - name: Build Hive Image
        run: docker build -t bigdata-platform:hive images/hive

      - name: List images
        run: docker images | grep bigdata-platform