name: Big Data Platform CI/CD

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  validate:
    name: Validate Configuration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Validate docker-compose.yml
        run: docker compose config --quiet

      - name: Check Dockerfiles exist
        run: |
          cd images
          for dir in */; do
            if [ ! -f "${dir}Dockerfile" ]; then
              echo "ERROR: Missing Dockerfile in ${dir}"
              exit 1
            fi
          done

      - name: Validate shell scripts
        run: |
          cd scripts
          for script in *.sh; do
            bash -n "$script" || exit 1
          done

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd frontend && npm install --legacy-peer-deps

      - name: Run lint
        run: cd frontend && npx eslint src --ext .js,.jsx || true

  build-all:
    name: Build All Docker Images
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Build Base Image
        run: docker build -t bigdata-platform-base:latest -f images/base/Dockerfile .

      - name: Build Hadoop Image
        run: docker build -t bigdata-platform-hadoop:latest -f images/hadoop/Dockerfile .

      - name: Build Spark Image
        run: docker build -t bigdata-platform-spark:latest -f images/spark/Dockerfile .

      - name: Build Hive Image
        run: docker build -t bigdata-platform-hive:latest -f images/hive/Dockerfile .

      - name: Build HBase Image
        run: docker build -t bigdata-platform-hbase:latest -f images/hbase/Dockerfile .

      - name: Build Kafka Image
        run: docker build -t bigdata-platform-kafka:latest -f images/kafka/Dockerfile .

      - name: Build ZooKeeper Image
        run: docker build -t bigdata-platform-zookeeper:latest -f images/zookeeper/Dockerfile .

      - name: Build NiFi Image
        run: docker build -t bigdata-platform-nifi:latest -f images/nifi/Dockerfile .


      - name: Build Sqoop Image
        run: docker build -t bigdata-platform-sqoop:latest -f images/sqoop/Dockerfile .

      - name: Build Oozie Image
        run: docker build -t bigdata-platform-oozie:latest -f images/oozie/Dockerfile .


      - name: Build Pig Image
        run: docker build -t bigdata-platform-pig:latest -f images/pig/Dockerfile .

      - name: List all built images
        run: docker images | grep bigdata-platform

      - name: Test Docker Compose
        run: docker compose config --services

      - name: Test base image
        run: docker run --rm bigdata-platform-base:latest java -version 2>&1 | head -1

      - name: Test Hadoop image
        run: docker run --rm bigdata-platform-hadoop:latest hadoop version 2>&1 | head -1

      - name: Test Spark image
        run: docker run --rm bigdata-platform-spark:latest spark-submit --version 2>&1 | head -1

      - name: Test Hive image  
        run: docker run --rm bigdata-platform-hive:latest hive --version 2>&1 | head -1

      - name: Test HBase image
        run: docker run --rm bigdata-platform-hbase:latest hbase version 2>&1 | head -1

      - name: Test Kafka image
        run: docker run --rm bigdata-platform-kafka:latest kafka-topics.sh --version 2>&1 | head -1 || docker run --rm bigdata-platform-kafka:latest kafka-broker-api-versions.sh --version 2>&1 | head -1

      - name: Test ZooKeeper image
        run: docker run --rm bigdata-platform-zookeeper:latest zkServer.sh version 2>&1 | head -1

      - name: Test NiFi image
        run: docker run --rm bigdata-platform-nifi:latest nifi --version 2>&1 | head -1

      - name: Test Sqoop image
        run: docker run --rm bigdata-platform-sqoop:latest sqoop version 2>&1 | head -1

      - name: Test Oozie image
        run: docker run --rm bigdata-platform-oozie:latest oozie version 2>&1 | head -1

      - name: Test Pig image
        run: docker run --rm bigdata-platform-pig:latest pig --version 2>&1 | head -1