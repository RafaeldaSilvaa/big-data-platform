name: Big Data Platform CI/CD

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  validate:
    name: Validate Configuration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Validate docker-compose.yml
        run: docker compose config --quiet

      - name: Check Dockerfiles exist
        run: |
          cd images
          for dir in */; do
            if [ ! -f "${dir}Dockerfile" ]; then
              echo "ERROR: Missing Dockerfile in ${dir}"
              exit 1
            fi
          done

      - name: Validate shell scripts
        run: |
          cd scripts
          for script in *.sh; do
            bash -n "$script" || exit 1
          done

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd frontend && npm install --legacy-peer-deps

      - name: Run lint
        run: cd frontend && npx eslint src --ext .js,.jsx || true

  build-all:
    name: Build All Docker Images
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Build Base Image
        run: docker build -t bigdata-platform-base:latest images/base

      - name: Build Hadoop Image
        run: docker build -t bigdata-platform-hadoop:latest images/hadoop

      - name: Build Spark Image
        run: docker build -t bigdata-platform-spark:latest images/spark

      - name: Build Hive Image
        run: docker build -t bigdata-platform-hive:latest images/hive

      - name: Build HBase Image
        run: docker build -t bigdata-platform-hbase:latest images/hbase

      - name: Build Kafka Image
        run: docker build -t bigdata-platform-kafka:latest images/kafka

      - name: Build ZooKeeper Image
        run: docker build -t bigdata-platform-zookeeper:latest images/zookeeper

      - name: Build NiFi Image
        run: docker build -t bigdata-platform-nifi:latest images/nifi

      - name: Build Flume Image
        run: docker build -t bigdata-platform-flume:latest images/flume

      - name: Build Sqoop Image
        run: docker build -t bigdata-platform-sqoop:latest images/sqoop

      - name: Build Oozie Image
        run: docker build -t bigdata-platform-oozie:latest images/oozie

      - name: Build Mahout Image
        run: docker build -t bigdata-platform-mahout:latest images/mahout

      - name: Build Pig Image
        run: docker build -t bigdata-platform-pig:latest images/pig

      - name: List all built images
        run: docker images | grep bigdata-platform

      - name: Test Docker Compose
        run: docker compose config --services