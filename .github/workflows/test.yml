name: Big Data Platform CI/CD

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  validate:
    name: Validate Configuration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Validate docker-compose.yml
        run: docker compose config --quiet

      - name: Check Dockerfiles exist
        run: |
          cd images
          for dir in */; do
            if [ ! -f "${dir}Dockerfile" ]; then
              echo "ERROR: Missing Dockerfile in ${dir}"
              exit 1
            fi
          done

      - name: Validate shell scripts
        run: |
          cd scripts
          for script in *.sh; do
            bash -n "$script" || exit 1
          done

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd frontend && npm install --legacy-peer-deps

      - name: Run lint
        run: cd frontend && npx eslint src --ext .js,.jsx || true

  build-all:
    name: Build All Docker Images
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Build Base Image
        run: docker build -t bigdata-platform-base:latest -f images/base/Dockerfile .

      - name: Build Hadoop Image
        run: docker build -t bigdata-platform-hadoop:latest -f images/hadoop/Dockerfile .

      - name: Build ZooKeeper Image
        run: docker build -t bigdata-platform-zookeeper:latest -f images/zookeeper/Dockerfile .

      - name: Build Kafka Image
        run: docker build -t bigdata-platform-kafka:latest -f images/kafka/Dockerfile .

      - name: Build Spark Image
        run: docker build -t bigdata-platform-spark:latest -f images/spark/Dockerfile .

      - name: Build Hive Image
        run: docker build -t bigdata-platform-hive:latest -f images/hive/Dockerfile .

      - name: Build HBase Image
        run: docker build -t bigdata-platform-hbase:latest -f images/hbase/Dockerfile .

      - name: Build NiFi Image
        run: docker build -t bigdata-platform-nifi:latest -f images/nifi/Dockerfile .

      - name: Build Sqoop Image
        run: docker build -t bigdata-platform-sqoop:latest -f images/sqoop/Dockerfile .

      - name: Build Oozie Image
        run: docker build -t bigdata-platform-oozie:latest -f images/oozie/Dockerfile .

      - name: Build Pig Image
        run: docker build -t bigdata-platform-pig:latest -f images/pig/Dockerfile .

      - name: Build Mahout Image
        run: docker build -t bigdata-platform-mahout:latest -f images/mahout/Dockerfile .

      - name: Build Flume Image
        run: docker build -t bigdata-platform-flume:latest -f images/flume/Dockerfile .

      - name: List all built images
        run: docker images | grep bigdata-platform

      - name: Verify docker-compose services
        run: docker compose config --services

  test-platform:
    name: Run Platform Tests
    runs-on: ubuntu-latest
    needs: build-all
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml pytest

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Run configuration tests
        run: python -m pytest tests/test_platform.py::TestConfiguration -v

      - name: Run docker-compose tests
        run: python -m pytest tests/test_platform.py::TestDockerCompose -v

      - name: Run dockerfile tests
        run: python -m pytest tests/test_platform.py::TestDockerfiles -v

      - name: Run script tests
        run: python -m pytest tests/test_platform.py::TestScripts -v

      - name: Run application tests
        run: python -m pytest tests/test_platform.py::TestApplications -v

      - name: Run frontend tests
        run: python -m pytest tests/test_platform.py::TestFrontend -v

      - name: Run Docker image functional tests
        run: python -m pytest tests/test_platform.py::TestDockerImages -v --tb=short