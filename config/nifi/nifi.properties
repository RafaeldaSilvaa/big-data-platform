# NiFi Configuration

# Core properties
nifi.version=1.25.0
nifi.flow.configuration.file=./conf/flow.xml.gz
nifi.flow.configuration.archive.enabled=true
nifi.flow.configuration.archive.max.size=10MB
nifi.flow.configuration.archive.max.count=10

# State management
nifi.state.management.configuration.file=./conf/state-management.xml
nifi.state.management.provider.local=local-provider

# Web properties
nifi.web.http.host=
nifi.web.http.port=8080
nifi.web.https.host=
nifi.web.https.port=8443

# Security
nifi.security.keystore=
nifi.security.keystoreType=
nifi.security.keystorePasswd=
nifi.security.keyPasswd=
nifi.security.truststore=
nifi.security.truststoreType=
nifi.security.truststorePasswd=
nifi.security.allow.anonymous=false

# Repository directories
nifi.flowfile.repository.directory=./flowfile_repository
nifi.content.repository.directory=./content_repository
nifi.provenance.repository.directory=./provenance_repository

# Provenance
nifi.provenance.repository.max.storage.size=1GB
nifi.provenance.repository.max.storage.time=30 days
nifi.provenance.repository.implementation=org.apache.nifi.provenance.PersistentProvenanceRepository

# Content max
nifi.content.repository.max.storage.size=10GB

# Archive
nifi.flowfile.repository.max.storage.size=500MB
nifi.flowfile.repository.max.storage.time=30 days

# Connector
nifi.remote.input.host=
nifi.remote.input.port=
nifi.remote.input.secure=false
nifi.remote.input.socket.port=

# Site-to-Site
nifi.s2s.enabled=false
nifi.s2s.port=10000

# Auto-refresh
nifi.ui.banner.text=
nifi.ui.refresh.interval=30s

# Memory
nifi.memory.max=512m
nifi.memory.min=256m

# Flow controller
nifi.flowcontroller.garbage.collection.threshold.enabled=false
nifi.flowcontroller.load.balance.port=16384

# Expression language
nifi.expression.language.extensions.enabled=true